name: Bug Report
description: File a bug report to help us improve Toolbarr
title: "Bug - "
labels: ["bug", "triage"]
type: Bug
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report
        Thanks for taking the time to fill out this bug report!
        Please fill out the information below as detailed as possible.

  - type: textarea
    id: description
    attributes:
      label: Description of the bug
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what happened...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: Tell us what should have happened...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true

  - type: input
    id: toolbarr-version
    attributes:
      label: Toolbarr Version
      description: What version of Toolbarr are you running? You can find it in the app's About screen.
      placeholder: "v0.3.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: Which OS are you running Toolbarr on?
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true

  - type: dropdown
    id: starr-app
    attributes:
      label: Affected Starr Application
      description: Which Starr application were you working with when the bug occurred?
      options:
        - Not applicable
        - Radarr
        - Sonarr
        - Lidarr
        - Readarr
        - Prowlarr
        - Whisparr
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant Toolbarr log output. This will be automatically formatted, so no need for backticks.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context about the problem here (screenshots, etc.).
      placeholder: Any additional information...
